<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <p class="eyebrow">SkillUp</p>
    <h2>Login</h2>
    <p>Welcome back. Sign in to manage your profile and matches.</p>

    <form id="login-form">
      <div class="auth-fields">
        <label class="field-label" for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" required>
        <label class="field-label" for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>
      </div>

      <button class="btn-primary" id="login-button" type="submit">Login</button>
    </form>

    <p id="message" class="status-message" aria-live="polite"></p>
    <p>Don't have an account? <a href="signup.html">Signup</a></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
