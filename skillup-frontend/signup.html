<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signup</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <p class="eyebrow">SkillUp</p>
    <h2>Signup</h2>
    <p>Create your account to start building your skill profile.</p>

    <form id="signup-form">
      <div class="auth-fields">
        <label class="field-label" for="name">Name</label>
        <input type="text" id="name" placeholder="Your full name" required>
        <label class="field-label" for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" required>
        <label class="field-label" for="password">Password</label>
        <input type="password" id="password" placeholder="At least 6 characters" required minlength="6">
      </div>

      <button class="btn-primary" id="signup-button" type="submit">Signup</button>
    </form>

    <p id="message" class="status-message" aria-live="polite"></p>
    <p>Already have an account? <a href="index.html">Login</a></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
